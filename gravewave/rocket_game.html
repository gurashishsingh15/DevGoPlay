<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STELLAR DRIFT</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    overflow: hidden;
    font-family: 'Orbitron', sans-serif;
    cursor: none;
  }

  #gameWrapper {
    position: relative;
    width: 100vw;
    height: 100vh;
  }

  #starfield {
    position: absolute;
    inset: 0;
    z-index: 0;
  }

  #canvas {
    position: absolute;
    inset: 0;
    z-index: 1;
  }

  /* HUD Overlay */
  #hud {
    position: absolute;
    inset: 0;
    z-index: 2;
    pointer-events: none;
  }

  /* Score */
  #scoreDisplay {
    position: absolute;
    top: 20px;
    left: 24px;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  #scoreLabel {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    letter-spacing: 4px;
    color: rgba(0,255,200,0.5);
    text-transform: uppercase;
  }
  #scoreValue {
    font-family: 'Orbitron', sans-serif;
    font-size: 32px;
    font-weight: 900;
    color: #00ffc8;
    text-shadow: 0 0 20px rgba(0,255,200,0.6), 0 0 40px rgba(0,255,200,0.3);
    letter-spacing: 2px;
  }

  /* Speed indicator */
  #speedBar {
    position: absolute;
    top: 20px;
    right: 24px;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 6px;
  }
  #speedLabel {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    letter-spacing: 4px;
    color: rgba(255,100,50,0.5);
  }
  #speedTrack {
    width: 120px;
    height: 4px;
    background: rgba(255,255,255,0.08);
    border-radius: 2px;
    overflow: hidden;
  }
  #speedFill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #ff6432, #ff2255);
    border-radius: 2px;
    transition: width 0.3s ease;
    box-shadow: 0 0 8px rgba(255,100,50,0.8);
  }

  /* Control hint */
  #hint {
    position: absolute;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    letter-spacing: 3px;
    color: rgba(255,255,255,0.25);
    animation: pulse 3s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 0.3; }
    50% { opacity: 0.7; }
  }

  /* Corner decorations */
  .corner {
    position: absolute;
    width: 30px;
    height: 30px;
    opacity: 0.3;
  }
  .corner-tl { top: 12px; left: 12px; border-top: 1px solid #00ffc8; border-left: 1px solid #00ffc8; }
  .corner-tr { top: 12px; right: 12px; border-top: 1px solid #00ffc8; border-right: 1px solid #00ffc8; }
  .corner-bl { bottom: 12px; left: 12px; border-bottom: 1px solid #00ffc8; border-left: 1px solid #00ffc8; }
  .corner-br { bottom: 12px; right: 12px; border-bottom: 1px solid #00ffc8; border-right: 1px solid #00ffc8; }

  /* Scanline effect */
  #scanlines {
    position: absolute;
    inset: 0;
    z-index: 3;
    pointer-events: none;
    background: repeating-linear-gradient(
      to bottom,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.03) 2px,
      rgba(0,0,0,0.03) 4px
    );
  }

  /* Vignette */
  #vignette {
    position: absolute;
    inset: 0;
    z-index: 3;
    pointer-events: none;
    background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.7) 100%);
  }
</style>
</head>
<body>
<div id="gameWrapper">
  <!-- Starfield layer -->
  <canvas id="starfield"></canvas>

  <!-- Game canvas -->
  <canvas id="canvas"></canvas>

  <!-- HUD -->
  <div id="hud">
    <div class="corner corner-tl"></div>
    <div class="corner corner-tr"></div>
    <div class="corner corner-bl"></div>
    <div class="corner corner-br"></div>

    <div id="scoreDisplay">
      <div id="scoreLabel">SCORE</div>
      <div id="scoreValue">0000</div>
    </div>

    <div id="speedBar">
      <div id="speedLabel">THREAT LEVEL</div>
      <div id="speedTrack"><div id="speedFill"></div></div>
    </div>

    <div id="hint">[ SPACE ] — TOGGLE THRUST</div>
  </div>

  <!-- Visual effects -->
  <div id="scanlines"></div>
  <div id="vignette"></div>
</div>

<script>
// ── Canvas setup ──────────────────────────────────────────────────────────────
const canvas = document.getElementById("canvas");
const brush = canvas.getContext("2d");
const sfCanvas = document.getElementById("starfield");
const sfCtx = sfCanvas.getContext("2d");

canvas.width = sfCanvas.width = window.innerWidth;
canvas.height = sfCanvas.height = window.innerHeight;

// ── HUD refs ──────────────────────────────────────────────────────────────────
const scoreValue = document.getElementById("scoreValue");
const speedFill = document.getElementById("speedFill");

// ── Starfield (parallax layers) ───────────────────────────────────────────────
const STAR_LAYERS = [
  { count: 120, speed: 0.15, size: 0.6, opacity: 0.4 },
  { count: 60,  speed: 0.4,  size: 1.0, opacity: 0.6 },
  { count: 25,  speed: 0.9,  size: 1.8, opacity: 0.9 },
];
const stars = [];
STAR_LAYERS.forEach((layer, li) => {
  for (let i = 0; i < layer.count; i++) {
    stars.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      layer: li,
      twinkle: Math.random() * Math.PI * 2,
    });
  }
});

function drawStars() {
  sfCtx.clearRect(0, 0, sfCanvas.width, sfCanvas.height);
  stars.forEach(s => {
    const layer = STAR_LAYERS[s.layer];
    s.x -= layer.speed;
    if (s.x < 0) { s.x = sfCanvas.width; s.y = Math.random() * sfCanvas.height; }
    s.twinkle += 0.02;
    const alpha = layer.opacity * (0.7 + 0.3 * Math.sin(s.twinkle));
    sfCtx.beginPath();
    sfCtx.arc(s.x, s.y, layer.size, 0, Math.PI * 2);
    sfCtx.fillStyle = `rgba(200,220,255,${alpha})`;
    sfCtx.fill();
  });
}

// ── Particle system (for flame + explosions) ─────────────────────────────────
const particles = [];

function spawnFlame(x, y) {
  for (let i = 0; i < 2; i++) {
    particles.push({
      x, y: y + (Math.random() - 0.5) * 8,
      vx: -(2 + Math.random() * 3),
      vy: (Math.random() - 0.5) * 1.5,
      life: 1,
      decay: 0.06 + Math.random() * 0.04,
      size: 3 + Math.random() * 5,
      type: 'flame',
    });
  }
}

function spawnExplosion(x, y) {
  for (let i = 0; i < 60; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 1 + Math.random() * 6;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 1,
      decay: 0.015 + Math.random() * 0.02,
      size: 2 + Math.random() * 5,
      type: 'explosion',
      hue: Math.random() < 0.5 ? 'orange' : 'white',
    });
  }
}

function updateParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.life -= p.decay;
    if (p.life <= 0) { particles.splice(i, 1); continue; }

    if (p.type === 'flame') {
      const g = brush.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.size * p.life);
      g.addColorStop(0, `rgba(255,200,50,${p.life})`);
      g.addColorStop(0.5, `rgba(255,80,20,${p.life * 0.6})`);
      g.addColorStop(1, `rgba(255,30,0,0)`);
      brush.beginPath();
      brush.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
      brush.fillStyle = g;
      brush.fill();
    } else {
      const color = p.hue === 'orange'
        ? `rgba(255,${100 + Math.floor(p.life * 100)},20,${p.life})`
        : `rgba(255,255,255,${p.life})`;
      brush.beginPath();
      brush.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
      brush.fillStyle = color;
      brush.fill();
    }
  }
}

// ── Game state ────────────────────────────────────────────────────────────────
let time = 0;
const frequency = 0.004;
const speed = 0.05;
let amplitude = 0;
const AMPLITUDE_LIMIT = 100;
let jitter = 100;
const JITTER_LIMIT = 100;
let goingUp = true;
let metorspeed = 5;
const MAX_METEOR_SPEED = 25;
let gameover = false;
let exploded = false;
let rocketX_ref = 0, rocketY_ref = 0;

// ── Meteors ───────────────────────────────────────────────────────────────────
const centerY = canvas.height / 2;
let meteorX1 = canvas.width, meteorX2 = canvas.width;
let meteorY1 = centerY - 200 + Math.random() * 200;
let meteorY2 = centerY + Math.random() * 200;

// ── Controls ──────────────────────────────────────────────────────────────────
window.addEventListener("keyup", (e) => {
  if (e.code === "Space") {
    goingUp = !goingUp;
    jitter = goingUp
      ? Math.min(JITTER_LIMIT, jitter + 200)
      : Math.max(-JITTER_LIMIT, jitter - 200);
  }
});

// ── Drawing: Moon ─────────────────────────────────────────────────────────────
function drawMoon(x, y) {
  brush.save();
  // Glow halo
  const halo = brush.createRadialGradient(x, y, 140, x, y, 260);
  halo.addColorStop(0, 'rgba(255,220,80,0.08)');
  halo.addColorStop(1, 'rgba(0,0,0,0)');
  brush.beginPath();
  brush.arc(x, y, 260, 0, Math.PI * 2);
  brush.fillStyle = halo;
  brush.fill();

  // Moon body
  const moonGrad = brush.createRadialGradient(x + 30, y - 30, 20, x, y, 175);
  moonGrad.addColorStop(0, '#1a1a2e');
  moonGrad.addColorStop(1, '#0a0a14');
  brush.beginPath();
  brush.arc(x, y, 175, 0, Math.PI * 2);
  brush.fillStyle = moonGrad;
  brush.shadowColor = '#FFD700';
  brush.shadowBlur = 35;
  brush.fill();

  // Moon rim
  brush.strokeStyle = 'rgba(255,215,0,0.15)';
  brush.lineWidth = 2;
  brush.stroke();
  brush.restore();
}

// ── Drawing: Meteor ───────────────────────────────────────────────────────────
function meteorball(x, y) {
  const radius = 38;
  const segments = 8;
  const steps = (2 * Math.PI) / segments;

  // Glow
  brush.save();
  brush.shadowColor = 'rgba(255,120,40,0.7)';
  brush.shadowBlur = 18;

  brush.beginPath();
  for (let i = 0; i <= segments; i++) {
    const angle = i * steps;
    const offset = Math.sin(i * 2.1) * (radius * 0.28);
    const r = radius + offset;
    const mx = x + Math.cos(angle) * r;
    const my = y + Math.sin(angle) * r;
    i === 0 ? brush.moveTo(mx, my) : brush.lineTo(mx, my);
  }
  brush.closePath();

  const mg = brush.createRadialGradient(x - 10, y - 10, 5, x, y, radius + 10);
  mg.addColorStop(0, '#b0b0b0');
  mg.addColorStop(0.5, '#6e6e6e');
  mg.addColorStop(1, '#3a3a3a');
  brush.fillStyle = mg;
  brush.fill();
  brush.restore();

  // Craters
  for (let i = 0; i < 4; i++) {
    const cx = x + Math.cos(i * 1.3) * (radius * 0.38);
    const cy = y + Math.sin(i * 1.3) * (radius * 0.38);
    brush.beginPath();
    brush.arc(cx, cy, radius * 0.13, 0, Math.PI * 2);
    brush.fillStyle = 'rgba(0,0,0,0.4)';
    brush.fill();
  }

  // Hot trail
  const trail = brush.createLinearGradient(x + 40, y, x + 120, y);
  trail.addColorStop(0, 'rgba(255,100,20,0.5)');
  trail.addColorStop(1, 'rgba(255,50,0,0)');
  brush.beginPath();
  brush.moveTo(x + 30, y - 6);
  brush.lineTo(x + 110, y);
  brush.lineTo(x + 30, y + 6);
  brush.fillStyle = trail;
  brush.fill();
}

// ── Drawing: Rocket ───────────────────────────────────────────────────────────
function rocketball(x, y) {
  const base = 22;
  const height = 32;
  const backX = x - height - 10;

  // Engine glow
  brush.save();
  brush.shadowColor = 'rgba(0,200,255,0.5)';
  brush.shadowBlur = 15;

  // Body
  brush.beginPath();
  brush.moveTo(x - height / 2, y - base / 2);
  brush.lineTo(backX, y - base / 2);
  brush.lineTo(backX, y + base / 2);
  brush.lineTo(x - height / 2, y + base / 2);
  brush.closePath();
  const bodyGrad = brush.createLinearGradient(backX, y - base / 2, backX, y + base / 2);
  bodyGrad.addColorStop(0, '#e8eaf6');
  bodyGrad.addColorStop(0.5, '#ffffff');
  bodyGrad.addColorStop(1, '#b0bec5');
  brush.fillStyle = bodyGrad;
  brush.fill();
  brush.strokeStyle = 'rgba(100,200,255,0.4)';
  brush.lineWidth = 1;
  brush.stroke();

  // Nose cone
  brush.beginPath();
  brush.moveTo(x - height / 2, y - base / 2);
  brush.lineTo(x + height / 2, y);
  brush.lineTo(x - height / 2, y + base / 2);
  brush.closePath();
  const noseGrad = brush.createLinearGradient(x - height / 2, y - base / 2, x + height / 2, y);
  noseGrad.addColorStop(0, '#ff4466');
  noseGrad.addColorStop(1, '#cc1133');
  brush.fillStyle = noseGrad;
  brush.fill();
  brush.stroke();

  // Window
  brush.beginPath();
  brush.arc(x - height / 2 - 8, y, 5, 0, Math.PI * 2);
  const winGrad = brush.createRadialGradient(x - height / 2 - 9, y - 1, 1, x - height / 2 - 8, y, 5);
  winGrad.addColorStop(0, '#aaf0ff');
  winGrad.addColorStop(1, '#004488');
  brush.fillStyle = winGrad;
  brush.fill();
  brush.strokeStyle = '#00cfff';
  brush.lineWidth = 1;
  brush.stroke();

  brush.restore();

  // Flame
  spawnFlame(backX - 2, y);
}

// ── Collision ─────────────────────────────────────────────────────────────────
function collision(rx, ry, mx, my) {
  const dist = Math.sqrt((rx - mx) ** 2 + (ry - my) ** 2);
  if (dist < 55 && !gameover) {
    gameover = true;
    spawnExplosion(rx, ry);
    setTimeout(() => location.reload(), 4500);
  }
}

// ── Game Over Screen ──────────────────────────────────────────────────────────
function drawGameOver() {
  brush.save();

  // Dark overlay
  brush.fillStyle = 'rgba(0,0,0,0.88)';
  brush.fillRect(0, 0, canvas.width, canvas.height);

  // Glitch-style title
  const cx = canvas.width / 2;
  const cy = canvas.height / 2;

  // Red shadow copies
  brush.font = "bold 68px 'Orbitron', sans-serif";
  brush.textAlign = 'center';
  brush.textBaseline = 'middle';

  brush.fillStyle = 'rgba(255,0,50,0.4)';
  brush.fillText('MISSION FAILED', cx - 3, cy - 3);
  brush.fillStyle = 'rgba(0,255,200,0.3)';
  brush.fillText('MISSION FAILED', cx + 3, cy + 3);

  brush.fillStyle = '#ffffff';
  brush.shadowColor = '#ff2255';
  brush.shadowBlur = 30;
  brush.fillText('MISSION FAILED', cx, cy);
  brush.shadowBlur = 0;

  // Divider line
  brush.strokeStyle = 'rgba(255,50,80,0.4)';
  brush.lineWidth = 1;
  brush.beginPath();
  brush.moveTo(cx - 220, cy + 45);
  brush.lineTo(cx + 220, cy + 45);
  brush.stroke();

  // Score
  brush.font = "900 36px 'Orbitron', sans-serif";
  brush.fillStyle = '#00ffc8';
  brush.shadowColor = '#00ffc8';
  brush.shadowBlur = 20;
  brush.fillText(`FINAL SCORE  ${Math.floor(time)}`, cx, cy + 90);
  brush.shadowBlur = 0;

  // Restart hint
  brush.font = "13px 'Share Tech Mono', monospace";
  brush.fillStyle = 'rgba(255,255,255,0.35)';
  brush.letterSpacing = '3px';
  brush.fillText('RESTARTING MISSION...', cx, cy + 140);

  brush.restore();
}

// ── Main loop ─────────────────────────────────────────────────────────────────
function animate() {
  drawStars();
  brush.clearRect(0, 0, canvas.width, canvas.height);

  if (gameover) {
    updateParticles();
    drawGameOver();
    return;
  }

  // Speed up over time
  if (metorspeed < MAX_METEOR_SPEED) metorspeed += 0.005;

  // Grow amplitude
  if (amplitude <= AMPLITUDE_LIMIT) amplitude += 0.2;

  const cy = canvas.height / 2;

  // ── Wave ──
  brush.beginPath();
  brush.lineWidth = 2.5;
  const wg = brush.createLinearGradient(0, 0, canvas.width, 0);
  wg.addColorStop(0, 'rgba(0,255,200,0.1)');
  wg.addColorStop(0.5, 'rgba(0,255,200,0.9)');
  wg.addColorStop(1, 'rgba(0,255,200,0.1)');
  brush.strokeStyle = wg;
  brush.shadowColor = '#00ffc8';
  brush.shadowBlur = 8;

  for (let x = 0; x <= canvas.width; x += 2) {
    const y = cy + Math.sin(x * frequency + time) * amplitude;
    x === 0 ? brush.moveTo(x, y) : brush.lineTo(x, y);
  }
  brush.stroke();
  brush.shadowBlur = 0;

  // ── Moon ──
  drawMoon(canvas.width / 100, canvas.height / 2);

  // ── Meteors ──
  meteorball(meteorX1, meteorY1);
  meteorball(meteorX2, meteorY2);

  meteorX1 -= metorspeed;
  meteorX2 -= metorspeed + 2;

  if (meteorX1 < -80) { meteorX1 = canvas.width; meteorY1 = cy - 220 + Math.random() * 440; }
  if (meteorX2 < -80) { meteorX2 = canvas.width; meteorY2 = cy - 220 + Math.random() * 440; }

  // ── Rocket ──
  const ballX = canvas.width / 3.9;
  const rawBallY = cy + Math.sin(ballX * frequency - time) * amplitude + jitter;
  rocketball(ballX, rawBallY);
  rocketX_ref = ballX;
  rocketY_ref = rawBallY;

  // ── Particles ──
  updateParticles();

  // ── Collision check ──
  collision(ballX, rawBallY, meteorX1, meteorY1);
  collision(ballX, rawBallY, meteorX2, meteorY2);

  // ── HUD update ──
  const score = Math.floor(time);
  scoreValue.textContent = String(score).padStart(4, '0');
  const threatPct = ((metorspeed - 5) / (MAX_METEOR_SPEED - 5)) * 100;
  speedFill.style.width = Math.min(100, threatPct) + '%';

  time += speed;
  requestAnimationFrame(animate);
}

animate();
</script>
</body>
</html>
