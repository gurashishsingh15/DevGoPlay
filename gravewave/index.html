<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>STELLAR DRIFT</title>

  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">

  <script src="https://cdn.tailwindcss.com"></script>

  <link rel="preload" as="script" href="gravewave.js">
</head>

<body class="m-0 p-0 box-border bg-black overflow-hidden font-['Orbitron',sans-serif] cursor-none">

  <div class="relative w-screen h-screen">

    <canvas id="starfield" class="absolute inset-0 z-0"></canvas>
    <canvas id="canvas" class="absolute inset-0 z-10"></canvas>

    <div id="hud" class="absolute inset-0 z-20 pointer-events-none">

      <div class="absolute top-3 left-3 w-[30px] h-[30px] opacity-30 border-t border-l border-[#00ffc8]"></div>
      <div class="absolute top-3 right-3 w-[30px] h-[30px] opacity-30 border-t border-r border-[#00ffc8]"></div>
      <div class="absolute bottom-3 left-3 w-[30px] h-[30px] opacity-30 border-b border-l border-[#00ffc8]"></div>
      <div class="absolute bottom-3 right-3 w-[30px] h-[30px] opacity-30 border-b border-r border-[#00ffc8]"></div>

      <div class="absolute top-5 left-6 flex flex-col gap-[2px]">
        <div class="font-['Share_Tech_Mono',monospace] text-[10px] tracking-[4px] text-[rgba(0,255,200,0.5)] uppercase">
          SCORE
        </div>
        <div id="scoreValue" class="text-[32px] font-black text-[#00ffc8] tracking-[2px]"
             style="text-shadow: 0 0 20px rgba(0,255,200,0.6), 0 0 40px rgba(0,255,200,0.3);">
          0000
        </div>
      </div>

      <div class="absolute top-5 right-6 flex flex-col items-end gap-[6px]">
        <div class="font-['Share_Tech_Mono',monospace] text-[10px] tracking-[4px] text-[rgba(255,100,50,0.5)]">
          THREAT LEVEL
        </div>
        <div class="w-[120px] h-[4px] bg-[rgba(255,255,255,0.08)] rounded-[2px] overflow-hidden">
          <div id="speedFill" class="h-full w-0 bg-gradient-to-r from-[#ff6432] to-[#ff2255] rounded-[2px] transition-all duration-300"
               style="box-shadow: 0 0 8px rgba(255,100,50,0.8);"></div>
        </div>
      </div>

      <div class="absolute bottom-6 left-1/2 -translate-x-1/2 font-['Share_Tech_Mono',monospace] text-[11px] tracking-[3px] text-[rgba(255,255,255,0.25)] animate-pulse">
        [ SPACE ] — TOGGLE THRUST
      </div>
    </div>

    <div class="absolute inset-0 z-30 pointer-events-none"
         style="background: repeating-linear-gradient(to bottom, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px);">
    </div>

    <div class="absolute inset-0 z-30 pointer-events-none"
         style="background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.7) 100%);">
    </div>

  </div>

<script type="module" src="gravewave.js"></script>
</body>
</html>
